<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Permanent+Marker&amp;family=Space+Grotesk:wght@400;600;700&amp;display=swap');
    </style>

    <!-- Roughen for doodle elements -->
    <filter id="roughen" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="2" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Heavier roughen specifically for the title text doodle effect -->
    <filter id="roughenTitle" x="-8%" y="-20%" width="116%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="3" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.8" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Lighter roughen for borders -->
    <filter id="roughenLight" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2" seed="9" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Shadow -->
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="2" dy="5" stdDeviation="8" flood-color="#1a000a" flood-opacity="0.6"/>
    </filter>

    <!-- Glow for iris -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Sketchy title: blur + merge for ink bleed -->
    <filter id="inkBleed" x="-5%" y="-15%" width="110%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.065" numOctaves="4" seed="8" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="0.4" result="blurred"/>
      <feMerge><feMergeNode in="blurred"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="canvasClip">
      <rect width="900" height="300" rx="14"/>
    </clipPath>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a000a"/>
      <stop offset="55%" stop-color="#3E000C"/>
      <stop offset="100%" stop-color="#300008"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3E000C" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a0006" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="300" rx="14" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect width="900" height="300" rx="14" fill="url(#vignette)"/>

  <!-- Dot grid -->
  <g opacity="0.055" clip-path="url(#canvasClip)">
    <pattern id="grid" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="13" cy="13" r="1.1" fill="#FFECD1"/>
    </pattern>
    <rect width="900" height="300" fill="url(#grid)"/>
  </g>

  <!-- OUTER BORDER doodled -->
  <rect x="7" y="7" width="886" height="286" rx="12"
    fill="none" stroke="#6b1a24" stroke-width="2.2"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#roughen)"/>
  <rect x="13" y="13" width="874" height="274" rx="10"
    fill="none" stroke="#FFECD1" stroke-width="0.8"
    stroke-dasharray="6,5"
    filter="url(#roughenLight)" opacity="0.15"/>

  <!-- CORNER BRACKETS -->
  <path d="M24,24 L24,54 M24,24 L54,24" fill="none" stroke="#FFECD1" stroke-width="2" stroke-linecap="round" filter="url(#roughen)" opacity="0.55"/>
  <path d="M876,24 L876,54 M876,24 L846,24" fill="none" stroke="#FFECD1" stroke-width="2" stroke-linecap="round" filter="url(#roughen)" opacity="0.55"/>
  <path d="M24,276 L24,246 M24,276 L54,276" fill="none" stroke="#FFECD1" stroke-width="2" stroke-linecap="round" filter="url(#roughen)" opacity="0.55"/>
  <path d="M876,276 L876,246 M876,276 L846,276" fill="none" stroke="#FFECD1" stroke-width="2" stroke-linecap="round" filter="url(#roughen)" opacity="0.55"/>

  <!-- DOODLE ACCENTS top right -->
  <g opacity="0.6" filter="url(#roughen)">
    <line x1="832" y1="30" x2="832" y2="50" stroke="#FFECD1" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="822" y1="40" x2="842" y2="40" stroke="#FFECD1" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="825" y1="33" x2="839" y2="47" stroke="#FFECD1" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="839" y1="33" x2="825" y2="47" stroke="#FFECD1" stroke-width="1.1" stroke-linecap="round"/>
  </g>
  <path d="M848,36 L855,28 L862,36 L869,28 L876,36" fill="none" stroke="#c4855a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#roughen)" opacity="0.5"/>

  <!-- Top-left dots -->
  <g fill="#FFECD1" opacity="0.3">
    <circle cx="68" cy="36" r="3" filter="url(#roughen)"/>
    <circle cx="80" cy="36" r="2" filter="url(#roughen)"/>
    <circle cx="89" cy="36" r="3.5" filter="url(#roughen)"/>
  </g>

  <!-- HEXAGON LOGO -->
  <polygon points="200,78 256,111 256,177 200,210 144,177 144,111" fill="#2a000a" opacity="0.95"/>
  <polygon points="200,78 256,111 256,177 200,210 144,177 144,111"
    fill="none" stroke="#FFECD1" stroke-width="2.2"
    stroke-linejoin="round" filter="url(#roughen)" opacity="0.8"/>
  <polygon points="200,96 246,120 246,168 200,192 154,168 154,120"
    fill="none" stroke="#FFECD1" stroke-width="0.9"
    stroke-linejoin="round" opacity="0.18"
    transform="rotate(30 200 144)" filter="url(#roughen)"/>

  <!-- Eye -->
  <ellipse cx="200" cy="144" rx="36" ry="22"
    fill="#1a0008" stroke="#FFECD1" stroke-width="1.8" filter="url(#roughen)"/>
  <path d="M164,144 Q200,112 236,144" fill="none" stroke="#FFECD1" stroke-width="1.6" stroke-linecap="round" filter="url(#roughen)" opacity="0.65"/>
  <path d="M164,144 Q200,176 236,144" fill="none" stroke="#FFECD1" stroke-width="1.6" stroke-linecap="round" filter="url(#roughen)" opacity="0.65"/>
  <circle cx="200" cy="144" r="12" fill="#c4855a" filter="url(#glow)" opacity="0.95"/>
  <circle cx="200" cy="144" r="5.5" fill="#1a0008"/>
  <circle cx="204" cy="140" r="2.5" fill="#FFECD1" opacity="0.9"/>

  <!-- Vertex dots -->
  <circle cx="200" cy="78"  r="3" fill="#FFECD1" opacity="0.45" filter="url(#roughen)"/>
  <circle cx="256" cy="111" r="3" fill="#FFECD1" opacity="0.45" filter="url(#roughen)"/>
  <circle cx="256" cy="177" r="3" fill="#FFECD1" opacity="0.45" filter="url(#roughen)"/>
  <circle cx="200" cy="210" r="3" fill="#FFECD1" opacity="0.45" filter="url(#roughen)"/>
  <circle cx="144" cy="177" r="3" fill="#FFECD1" opacity="0.45" filter="url(#roughen)"/>
  <circle cx="144" cy="111" r="3" fill="#FFECD1" opacity="0.45" filter="url(#roughen)"/>

  <!-- Connector lines -->
  <line x1="200" y1="78"  x2="200" y2="123" stroke="#FFECD1" stroke-width="0.9" opacity="0.2" stroke-dasharray="3,4"/>
  <line x1="256" y1="111" x2="232" y2="133" stroke="#FFECD1" stroke-width="0.9" opacity="0.2" stroke-dasharray="3,4"/>
  <line x1="256" y1="177" x2="232" y2="155" stroke="#FFECD1" stroke-width="0.9" opacity="0.2" stroke-dasharray="3,4"/>
  <line x1="200" y1="210" x2="200" y2="165" stroke="#FFECD1" stroke-width="0.9" opacity="0.2" stroke-dasharray="3,4"/>
  <line x1="144" y1="177" x2="168" y2="155" stroke="#FFECD1" stroke-width="0.9" opacity="0.2" stroke-dasharray="3,4"/>
  <line x1="144" y1="111" x2="168" y2="133" stroke="#FFECD1" stroke-width="0.9" opacity="0.2" stroke-dasharray="3,4"/>

  <!-- VERTICAL DIVIDER -->
  <line x1="280" y1="74" x2="280" y2="226"
    stroke="#6b1a24" stroke-width="1.3"
    stroke-dasharray="4,4"
    filter="url(#roughen)" opacity="0.6"/>

  <!-- TEXT BLOCK -->

  <!-- Straight line above title -->
  <line x1="302" y1="100" x2="826" y2="100" stroke="#FFECD1" stroke-width="1" opacity="0.25"/>

  <!-- ===== DOODLED TITLE — 3 layers for hand-drawn marker look ===== -->

  <!-- Layer 1: Dark chocolate shadow pass — slightly offset, roughened -->
  <text
    x="306" y="162"
    font-family="'Permanent Marker', cursive"
    font-size="58"
    font-weight="400"
    letter-spacing="6"
    fill="#1a0008"
    opacity="0.7"
    filter="url(#roughenTitle)"
  >AYANOKOJI</text>

  <!-- Layer 2: Stroke outline pass — gives the pen-drawn border feel -->
  <text
    x="303" y="160"
    font-family="'Permanent Marker', cursive"
    font-size="58"
    font-weight="400"
    letter-spacing="6"
    fill="none"
    stroke="#8b3a10"
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.45"
    filter="url(#roughenTitle)"
  >AYANOKOJI</text>

  <!-- Layer 3: Main sand fill — with ink bleed filter -->
  <text
    x="303" y="160"
    font-family="'Permanent Marker', cursive"
    font-size="58"
    font-weight="400"
    letter-spacing="6"
    fill="#FFECD1"
    filter="url(#inkBleed)"
  >AYANOKOJI</text>

  <!-- Straight line below title -->
  <line x1="302" y1="172" x2="826" y2="172" stroke="#FFECD1" stroke-width="1" opacity="0.25"/>

  <!-- Subtitle pill -->
  <rect x="302" y="182" width="216" height="22" rx="4"
    fill="#1a0008" stroke="#FFECD1" stroke-width="1.2"
    filter="url(#roughen)" opacity="0.9"/>
  <text
    x="312" y="197"
    font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif"
    font-size="10"
    font-weight="600"
    letter-spacing="4"
    fill="#FFECD1"
    opacity="0.8"
  >PROJECT  INIT  SKILL</text>

  <!-- Tagline -->
  <line x1="302" y1="218" x2="310" y2="218" stroke="#c4855a" stroke-width="1.5" stroke-linecap="round" filter="url(#roughen)" opacity="0.7"/>
  <text
    x="318" y="222"
    font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif"
    font-size="9.5"
    font-weight="400"
    letter-spacing="4"
    fill="#FFECD1"
    opacity="0.45"
  >UNIVERSAL  AGENT  PROTOCOL</text>

  <!-- Bottom accent line -->
  <line x1="302" y1="244" x2="814" y2="244" stroke="#6b1a24" stroke-width="1.2" opacity="0.5"/>

</svg>