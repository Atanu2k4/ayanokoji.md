<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&amp;display=swap');
    </style>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bgGrad)" rx="6"/>
  <rect width="900" height="300" fill="url(#glowGrad)" rx="6"/>

  <!-- Subtle border -->
  <rect width="900" height="300" fill="none" stroke="#2a2a2a" stroke-width="1" rx="6"/>

  <!-- ============ HEXAGON LOGO (centered at x=200, y=150) ============ -->

  <!-- Outer hexagon -->
  <polygon
    points="200,82 252,113 252,175 200,206 148,175 148,113"
    fill="none"
    stroke="#c0c0c0"
    stroke-width="1.2"
    filter="url(#subtleGlow)"
  />

  <!-- Inner hexagon (rotated 30deg) -->
  <polygon
    points="200,100 242,122 242,167 200,189 158,167 158,122"
    fill="none"
    stroke="#606060"
    stroke-width="0.6"
    opacity="0.5"
    transform="rotate(30 200 144)"
  />

  <!-- Eye outline (ellipse) -->
  <ellipse cx="200" cy="144" rx="36" ry="22"
    fill="none"
    stroke="#d8d8d8"
    stroke-width="1.1"
    filter="url(#subtleGlow)"
  />

  <!-- Eye upper lid curve -->
  <path d="M164,144 Q200,112 236,144" fill="none" stroke="#d8d8d8" stroke-width="1.1"/>
  <!-- Eye lower lid curve -->
  <path d="M164,144 Q200,176 236,144" fill="none" stroke="#d8d8d8" stroke-width="1.1"/>

  <!-- Iris -->
  <circle cx="200" cy="144" r="12"
    fill="none"
    stroke="#b0b0b0"
    stroke-width="1"
    filter="url(#subtleGlow)"
  />

  <!-- Pupil -->
  <circle cx="200" cy="144" r="5" fill="#e0e0e0" opacity="0.9"/>

  <!-- Center dot -->
  <circle cx="200" cy="144" r="1.5" fill="#ffffff"/>

  <!-- Geometric corner dots on hexagon vertices -->
  <circle cx="200" cy="82"  r="2.2" fill="#888888"/>
  <circle cx="252" cy="113" r="2.2" fill="#888888"/>
  <circle cx="252" cy="175" r="2.2" fill="#888888"/>
  <circle cx="200" cy="206" r="2.2" fill="#888888"/>
  <circle cx="148" cy="175" r="2.2" fill="#888888"/>
  <circle cx="148" cy="113" r="2.2" fill="#888888"/>

  <!-- Connecting lines from hex corners toward eye (subtle) -->
  <line x1="200" y1="82"  x2="200" y2="122" stroke="#444" stroke-width="0.5" opacity="0.6"/>
  <line x1="252" y1="113" x2="232" y2="135" stroke="#444" stroke-width="0.5" opacity="0.6"/>
  <line x1="252" y1="175" x2="232" y2="153" stroke="#444" stroke-width="0.5" opacity="0.6"/>
  <line x1="200" y1="206" x2="200" y2="166" stroke="#444" stroke-width="0.5" opacity="0.6"/>
  <line x1="148" y1="175" x2="168" y2="153" stroke="#444" stroke-width="0.5" opacity="0.6"/>
  <line x1="148" y1="113" x2="168" y2="135" stroke="#444" stroke-width="0.5" opacity="0.6"/>

  <!-- ============ TEXT BLOCK (right of logo) ============ -->

  <!-- Decorative thin rule above title -->
  <line x1="320" y1="118" x2="820" y2="118" stroke="#2e2e2e" stroke-width="0.8"/>

  <!-- Main title -->
  <text
    x="320" y="160"
    font-family="'Outfit', 'Segoe UI', Arial, sans-serif"
    font-size="48"
    font-weight="700"
    letter-spacing="18"
    fill="#e8e8e8"
    filter="url(#softGlow)"
  >AYANOKOJI</text>

  <!-- Subtitle -->
  <text
    x="323" y="185"
    font-family="'Outfit', 'Segoe UI', Arial, sans-serif"
    font-size="11"
    font-weight="300"
    letter-spacing="6"
    fill="#888888"
  >PROJECT  INIT  SKILL</text>

  <!-- Decorative thin rule below subtitle -->
  <line x1="320" y1="200" x2="820" y2="200" stroke="#2e2e2e" stroke-width="0.8"/>

  <!-- Tagline -->
  <text
    x="323" y="220"
    font-family="'Outfit', 'Segoe UI', Arial, sans-serif"
    font-size="9"
    font-weight="300"
    letter-spacing="3.5"
    fill="#888888"
  >UNIVERSAL  AGENT  PROTOCOL</text>
</svg>
